[pytest]
# SAFETY (audit F2 follow-up): the repo root has real hardware scripts named
# like `dropper_test.py`, `motor_test.py`, `movement_test.py`,
# `depth_hold_bar02_test.py` — these ARM the real Pixhawk and drive real
# actuators/thrusters as MODULE-LEVEL side effects (they are meant to be run
# directly with `python3 script.py`, never imported).
#
# pytest's default `python_files` glob includes `*_test.py`, and the ROS
# `launch_testing` pytest plugin hooks `pytest_pycollect_makemodule` to
# eagerly `import` every file pytest's directory collector matches — even
# when you pass an explicit test file path on the command line, pytest's
# collector still walks the containing directory tree and reaches rootdir.
# Confirmed live 2026-07-12: running exactly
#   python3 -m pytest tests/test_msg_compat.py -v
# with no config imported and ran `dropper_test.py`'s top level, which
# connected to /dev/ttyACM0, ARMED the vehicle, and drove the marker servo,
# TWICE (once for --collect-only, once for the real run), before erroring
# out on an interactive input() call.
#
# Fix: restrict collection to tests/ only, and restrict the file-matching
# glob to `test_*.py` (our own naming convention) so `*_test.py` scripts at
# the repo root are never treated as collectible test modules.
testpaths = tests
python_files = test_*.py
